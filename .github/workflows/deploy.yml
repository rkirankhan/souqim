name: Build and Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Opt into Node 24 runtime for all JavaScript actions ahead of the
      # 2026-06-16 deprecation deadline. Safe — Node 20 actions run fine on 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          # The Hostinger FTP user u219239568.souqim.com is chrooted into
          # public_html/, so its home is already the web root. Writing to
          # ./public_html/ would create a nested public_html/public_html/
          # which souqim.com doesn't read from. Upload to ./ instead.
          server-dir: ./
          dangerous-clean-slate: false
